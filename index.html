<script>
document.addEventListener("DOMContentLoaded", () => {

  // Lucide 아이콘 안전 실행
  if (window.lucide) {
    lucide.createIcons();
  }

  // 캐러셀 요소 체크
  const carouselContainer = document.getElementById('carousel-container');
  const nextBtn = document.getElementById('next-btn');
  const prevBtn = document.getElementById('prev-btn');

  // 요소 없으면 캐러셀 기능 스킵 (에러 방지)
  if (!carouselContainer || carouselContainer.children.length === 0) {
    console.warn("캐러셀 요소 없음 - 스킵됨");
    return;
  }

  let currentIndex = 0;

  // 카드 width 안전 계산
  function getCardWidth() {
    const firstCard = carouselContainer.children[0];
    return firstCard ? firstCard.offsetWidth : 0;
  }

  const gap = 24;

  function updateCarousel() {
    const cardWidth = getCardWidth();
    if (!cardWidth) return;

    const cardWithGap = cardWidth + gap;
    const offset = -currentIndex * cardWithGap;

    carouselContainer.style.transform = `translateX(${offset}px)`;
  }

  function getMaxIndex() {
    const visibleCards = 4;
    return Math.max(0, carouselContainer.children.length - visibleCards);
  }

  // Next 버튼
  if (nextBtn) {
    nextBtn.addEventListener('click', () => {
      const maxIndex = getMaxIndex();
      currentIndex = currentIndex < maxIndex ? currentIndex + 1 : 0;
      updateCarousel();
    });
  }

  // Prev 버튼
  if (prevBtn) {
    prevBtn.addEventListener('click', () => {
      const maxIndex = getMaxIndex();
      currentIndex = currentIndex > 0 ? currentIndex - 1 : maxIndex;
      updateCarousel();
    });
  }

  // 자동 슬라이드 (버튼 있을 때만)
  if (nextBtn) {
    setInterval(() => {
      nextBtn.click();
    }, 5000);
  }

});
</script>
