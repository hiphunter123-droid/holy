<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Commerce - 코인으로 쇼핑하세요</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .app-wrapper {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      background: #fafafa;
    }
  </style>
</head>

<body>
<div class="app-wrapper">

<!-- Header -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-8 py-5 flex justify-between items-center">
    <div class="text-2xl font-bold">LOGO</div>
    <nav class="hidden md:flex gap-8">
      <a href="#products">상품 보기</a>
      <a href="#method">결제 방법</a>
    </nav>
  </div>
</header>

<!-- Hero -->
<section class="bg-white py-20 text-center">
  <h1 class="text-5xl font-bold mb-4">코인으로 더 저렴하게 쇼핑하세요!</h1>
  <p class="text-gray-600 mb-10">USDT 결제 시 최대 10% 할인</p>
  <button class="bg-black text-white px-6 py-3 rounded-lg">지금 시작하기</button>
</section>

<!-- Products -->
<section class="py-20 px-8" id="products">
  <h2 class="text-3xl font-bold mb-8">핫딜 Apple 전자제품</h2>

  <div class="relative overflow-hidden">
    <div id="carousel-container" class="flex gap-6 transition-transform duration-500">

      <div class="w-64 bg-white shadow rounded-lg p-4 flex-shrink-0">
        <i data-lucide="smartphone"></i>
        <h3>iPhone 15 Pro</h3>
        <p>₩1,499,000</p>
      </div>

      <div class="w-64 bg-white shadow rounded-lg p-4 flex-shrink-0">
        <i data-lucide="tablet"></i>
        <h3>iPad Air</h3>
        <p>₩899,000</p>
      </div>

      <div class="w-64 bg-white shadow rounded-lg p-4 flex-shrink-0">
        <i data-lucide="watch"></i>
        <h3>Apple Watch 9</h3>
        <p>₩399,000</p>
      </div>

      <div class="w-64 bg-white shadow rounded-lg p-4 flex-shrink-0">
        <i data-lucide="laptop"></i>
        <h3>MacBook Air</h3>
        <p>₩1,699,000</p>
      </div>

    </div>

    <button id="prev-btn" class="absolute left-0 top-1/2 -translate-y-1/2 bg-black text-white px-3 py-2">‹</button>
    <button id="next-btn" class="absolute right-0 top-1/2 -translate-y-1/2 bg-black text-white px-3 py-2">›</button>
  </div>
</section>

<!-- Payment Method Section -->
<section class="py-20 px-8" id="method">
  <h2 class="text-3xl font-bold text-center mb-12">코인 결제 방법</h2>

  <div class="grid md:grid-cols-3 gap-8 max-w-6xl mx-auto">

    <div class="bg-white p-6 rounded-xl shadow text-center">
      <div class="text-2xl font-bold mb-4">1</div>
      <h3 class="font-semibold mb-2">결제하기</h3>
      <p class="text-sm text-gray-600">상품 선택 후 결제 진행</p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow text-center">
      <div class="text-2xl font-bold mb-4">2</div>
      <h3 class="font-semibold mb-2">코인 전송</h3>
      <p class="text-sm text-gray-600">지갑 주소로 송금</p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow text-center">
      <div class="text-2xl font-bold mb-4">3</div>
      <h3 class="font-semibold mb-2">완료</h3>
      <p class="text-sm text-gray-600">확인 후 배송 진행</p>
    </div>

  </div>
</section>

<!-- CTA -->
<section class="bg-black text-white py-20 text-center">
  <h2 class="text-3xl font-bold mb-6">지금 바로 쇼핑을 시작하세요!</h2>
  <button class="bg-white text-black px-6 py-3 rounded-lg">시작하기</button>
</section>

<!-- Footer -->
<footer class="py-10 text-center text-gray-500">
  © 2024 Crypto Commerce
</footer>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  if (window.lucide) lucide.createIcons();

  const container = document.getElementById("carousel-container");
  const nextBtn = document.getElementById("next-btn");
  const prevBtn = document.getElementById("prev-btn");

  if (!container) return;

  let index = 0;
  const gap = 24;

  function update() {
    const card = container.children[0];
    if (!card) return;
    const width = card.offsetWidth + gap;
    container.style.transform = `translateX(-${index * width}px)`;
  }

  function maxIndex() {
    return Math.max(0, container.children.length - 1);
  }

  nextBtn?.addEventListener("click", () => {
    index = index < maxIndex() ? index + 1 : 0;
    update();
  });

  prevBtn?.addEventListener("click", () => {
    index = index > 0 ? index - 1 : maxIndex();
    update();
  });

  setInterval(() => nextBtn?.click(), 5000);

});
</script>

</body>
</html>
