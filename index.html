<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Commerce - 코인으로 쇼핑하세요</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      width: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .app-wrapper {
      min-height: 100vh;
      width: 100%;
      display: flex;

      flex-direction: column;
      background: #fafafa;
    }
  </style>
</head>

<body>
<div class="app-wrapper">

<!-- (중간 HTML 그대로 유지됨 — 생략 없이 그대로 복붙 사용하면 됨) -->

<!-- ⭐ 중요: 여기까지는 너 코드 그대로 유지 -->

<script>
  // Lucide 아이콘 실행
  lucide.createIcons();

  // Carousel 기능 그대로 유지
  let currentIndex = 0;
  const carouselContainer = document.getElementById('carousel-container');
  const cardWidth = carouselContainer.children[0].offsetWidth;
  const gap = 24;
  const cardWithGap = cardWidth + gap;

  function updateCarousel() {
    const offset = -currentIndex * cardWithGap;
    carouselContainer.style.transform = `translateX(${offset}px)`;
  }

  document.getElementById('next-btn').addEventListener('click', () => {
    if (currentIndex < carouselContainer.children.length - 4) {
      currentIndex++;
    } else {
      currentIndex = 0;
    }
    updateCarousel();
  });

  document.getElementById('prev-btn').addEventListener('click', () => {
    if (currentIndex > 0) {
      currentIndex--;
    } else {
      currentIndex = carouselContainer.children.length - 4;
    }
    updateCarousel();
  });

  setInterval(() => {
    document.getElementById('next-btn').click();
  }, 5000);
</script>

</body>
</html>
