<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Commerce - 코인으로 쇼핑하세요</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .app-wrapper {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      background: #fafafa;
      overflow-y: auto;
    }
  </style>
</head>

<body>
<div class="app-wrapper">

<!-- Header -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-8 py-5">
    <div class="flex items-center justify-between">
      <div class="text-2xl font-bold">LOGO</div>

      <nav class="hidden md:flex gap-8 absolute left-1/2 transform -translate-x-1/2">
        <a href="#benefits">혜택 안내</a>
        <a href="#products">상품 보기</a>
        <a href="#support">고객 지원</a>
      </nav>

      <div class="flex gap-4">
        <button class="border px-4 py-2 rounded">로그인</button>
        <button class="bg-gray-900 text-white px-4 py-2 rounded">회원가입</button>
      </div>
    </div>
  </div>
</header>

<!-- Hero -->
<section class="bg-white py-20 px-8 text-center">
  <h1 class="text-5xl font-bold mb-4">코인으로 더 저렴하게 쇼핑하세요!</h1>
  <p class="text-xl text-gray-600 mb-10">USDT 결제 시 최대 10% 할인</p>
</section>

<!-- Products -->
<section class="py-20 px-8" id="products">
  <div class="max-w-6xl mx-auto">
    <h2 class="text-4xl font-bold mb-12">핫딜 Apple 전자제품</h2>

    <div class="grid md:grid-cols-4 gap-6">

      <div class="bg-white p-5 rounded shadow">
        <i data-lucide="smartphone"></i>
        <h3>iPhone 15 Pro</h3>
        <p>₩1,499,000</p>
      </div>

      <div class="bg-white p-5 rounded shadow">
        <i data-lucide="tablet"></i>
        <h3>iPad Air</h3>
        <p>₩899,000</p>
      </div>

      <div class="bg-white p-5 rounded shadow">
        <i data-lucide="watch"></i>
        <h3>Apple Watch</h3>
        <p>₩399,000</p>
      </div>

      <div class="bg-white p-5 rounded shadow">
        <i data-lucide="laptop"></i>
        <h3>MacBook Air</h3>
        <p>₩1,699,000</p>
      </div>

    </div>
  </div>
</section>

<footer class="text-center py-10 text-gray-500">
© 2024 Crypto Commerce
</footer>

</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
